<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LotoFácil PRO</title>

<style>
body{font-family:Arial;margin:0;background:#f4f6f9;display:flex}
.sidebar{width:350px;background:#1f2937;color:#fff;padding:10px;height:100vh;overflow-y:auto}
.main{flex:1;padding:10px;text-align:center}

.grid{display:grid;grid-template-columns:repeat(5,60px);gap:8px;justify-content:center}
.cell{width:60px;height:60px;border-radius:8px;background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;font-weight:bold}
.sel{background:#10b981;color:#fff}

input{width:45px;font-weight:bold;text-align:center}
textarea{width:95%;height:40px}

.filtro{background:#111;padding:8px;margin:6px 0;border-radius:6px}

button{padding:10px;margin:5px;font-weight:bold}
</style>
</head>

<body>

<div class="sidebar">

<h3>Seleção</h3>
<div id="contSel">0</div>
<button onclick="selAll()">25</button>
<button onclick="clearSel()">Limpar</button>

<h3>Config</h3>
Qtd <input id="qtd" value="15">
Jogos <input id="qtdJogos" value="50">

<h3>Filtros</h3>

<div class="filtro">
<label><input type="checkbox" id="f_soma" checked> Soma</label><br>
<input id="somaMin" value="170"> <input id="somaMax" value="280">
</div>

<div class="filtro">
<label><input type="checkbox" id="f_pares" checked> Pares</label><br>
<input id="paresMin" value="5"> <input id="paresMax" value="10">
</div>

<div class="filtro">
<label><input type="checkbox" id="f_imp" checked> Ímpares</label><br>
<input id="impMin" value="5"> <input id="impMax" value="10">
</div>

<div class="filtro">
<label><input type="checkbox" id="f_seq" checked> Sequência</label><br>
<input id="s2min" value="0"> <input id="s2max" value="5">
</div>

<div class="filtro">
<label><input type="checkbox" id="f_c1"> Filtro 1</label>
<textarea id="c1"></textarea>
</div>

</div>

<div class="main">

<h2>LotoFácil PRO</h2>

<div id="grid" class="grid"></div>

<button onclick="gerar()">GERAR</button>

<textarea id="out"></textarea>

</div>

<script>

let sel=[];
const grid = document.getElementById("grid");
const contSel = document.getElementById("contSel");

// GRID
for(let i=1;i<=25;i++){
 let d=document.createElement("div");
 d.className="cell";
 d.innerText=String(i).padStart(2,'0');

 d.onclick=()=>{
  if(sel.includes(i)){
    sel = sel.filter(n=>n!==i);
    d.classList.remove("sel");
  }else{
    sel.push(i);
    d.classList.add("sel");
  }
  contSel.innerText=sel.length;
 };

 grid.appendChild(d);
}

// BOTÕES
function selAll(){
 sel=[...Array(25)].map((_,i)=>i+1);
 document.querySelectorAll(".cell").forEach(c=>c.classList.add("sel"));
 contSel.innerText=25;
}

function clearSel(){
 sel=[];
 document.querySelectorAll(".cell").forEach(c=>c.classList.remove("sel"));
 contSel.innerText=0;
}

// FUNÇÕES
function soma(j){return j.reduce((a,b)=>a+b,0)}

function seqCount(j){
 let c=1,r=0;
 for(let i=1;i<j.length;i++){
  if(j[i]==j[i-1]+1)c++;
  else{if(c>=2)r++;c=1;}
 }
 if(c>=2)r++;
 return r;
}

function parse(t){return t.match(/\d+/g)?.map(Number)||[]}

// GERAR
function gerar(){

 if(sel.length===0){
  alert("Selecione as dezenas!");
  return;
 }

 let qtd=+document.getElementById("qtd").value;
 let total=+document.getElementById("qtdJogos").value;

 let res=[],t=0;

 while(res.length<total && t<50000){
  t++;

  let pool=[...sel],j=[];

  while(j.length<qtd && pool.length){
   let i=Math.floor(Math.random()*pool.length);
   j.push(pool.splice(i,1)[0]);
  }

  if(j.length!=qtd)continue;

  j.sort((a,b)=>a-b);

  let ok=true;

  if(f_soma.checked){
   if(soma(j)<+somaMin.value||soma(j)>+somaMax.value) ok=false;
  }

  let p=j.filter(n=>n%2==0).length;

  if(f_pares.checked){
   if(p<+paresMin.value||p>+paresMax.value) ok=false;
  }

  let imp=j.length-p;

  if(f_imp.checked){
   if(imp<+impMin.value||imp>+impMax.value) ok=false;
  }

  if(f_seq.checked){
   let s=seqCount(j);
   if(s<+s2min.value||s>+s2max.value) ok=false;
  }

  if(f_c1.checked){
   let lista=parse(c1.value);
   let c=j.filter(n=>lista.includes(n)).length;
   if(c<1) ok=false;
  }

  if(ok) res.push(j);
 }

 document.getElementById("out").value =
  res.map(j=>j.map(n=>String(n).padStart(2,'0')).join(" ")).join("\n");
}

</script>

</body>
</html>
